name: Actualizar MQ Atmos

on:
  schedule:
    - cron: '*/10 * * * *'  # Cada 10 minutos (como V19.0)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3
      
      - name: Verificar Python pre-instalado
        run: |
          python3 --version
          pip --version
      
      - name: Instalar dependencias
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Ejecutar ATMOS V19.0
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python3 main.py
